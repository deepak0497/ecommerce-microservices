name: Deploy Product Service

on:
  push:
    paths:
      - 'ProductService/**'
    branches:
      - main

workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore ProductService/ProductService.csproj

    - name: Build Project
      run: dotnet build ProductService/ProductService.csproj --configuration Release --no-restore

    - name: Publish Project
      run: dotnet publish ProductService/ProductService.csproj -c Release -o publish

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: productservice-deepak
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: publish
