name: Deploy Product Service

on:
  push:
    branches:
      - main
    paths:
      - 'ProductService/**'

  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.0'

      - name: Restore
        run: dotnet restore ProductService/ProductService.csproj

      - name: Build
        run: dotnet build ProductService/ProductService.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ProductService/ProductService.csproj -c Release -o publish

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: productservice-deepak
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
